<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline | KVVI Izegem</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 24rem; }
    .badge {
      display: inline-block;
      background: #003366;
      color: #C5A059;
      font-weight: 900;
      font-size: 2rem;
      padding: 0.5rem 1.5rem;
      border-radius: 1rem;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
    p { color: #64748b; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      background: #003366;
      color: white;
      text-decoration: none;
      font-weight: 700;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #002244; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">KVVI</div>
    <h1>Geen internetverbinding</h1>
    <p>Je bent offline. De pagina die je zoekt is niet beschikbaar in de cache.<br>Probeer opnieuw zodra je verbinding hebt.</p>
    <a href="/" class="btn">Naar startpagina</a>
  </div>
</body>
</html>
